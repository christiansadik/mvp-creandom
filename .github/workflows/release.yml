name: Release (main)

on:
  push:
    branches:
      - master

jobs:
  release:
    name: Changelog, GitHub Release, Deploy production
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Load secrets from Doppler
        run: doppler secrets download --no-file --format env-no-quotes >> $GITHUB_ENV
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      # ── Versioning ──────────────────────────────────────────────────────────
      - name: Compute next version
        id: version
        run: |
          # Get latest tag; empty string if none exists
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)

          if [ -z "$LATEST" ]; then
            MAJOR=0; MINOR=0; PATCH=0
            COMMITS=$(git log --format="%s %b")
          else
            MAJOR=$(echo $LATEST | cut -d. -f1 | tr -d v)
            MINOR=$(echo $LATEST | cut -d. -f2)
            PATCH=$(echo $LATEST | cut -d. -f3)
            COMMITS=$(git log ${LATEST}..HEAD --format="%s %b")
          fi

          # Check for BREAKING CHANGE in commit messages since last tag
          if echo "$COMMITS" | grep -qiE "BREAKING[[:space:]]CHANGE|!:"; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          else
            MINOR=$((MINOR + 1))
            PATCH=0
          fi

          NEXT="v${MAJOR}.${MINOR}.${PATCH}"
          echo "previous=${LATEST:-none}" >> $GITHUB_OUTPUT
          echo "next=$NEXT" >> $GITHUB_OUTPUT
          echo "Next version: $NEXT (was ${LATEST:-none})"

      # ── Changelog ───────────────────────────────────────────────────────────
      - name: Generate changelog entry
        id: changelog
        run: |
          PREVIOUS=${{ steps.version.outputs.previous }}
          NEXT=${{ steps.version.outputs.next }}
          DATE=$(date +%Y-%m-%d)

          # Collect commits since last tag
          if [ "$PREVIOUS" = "none" ]; then
            COMMITS=$(git log --format="- %s" --no-merges)
          else
            COMMITS=$(git log ${PREVIOUS}..HEAD --format="- %s" --no-merges)
          fi

          # Group by prefix
          FEAT=$(echo "$COMMITS" | grep -E "^- feat" || true)
          FIX=$(echo "$COMMITS" | grep -E "^- fix" || true)
          DOCS=$(echo "$COMMITS" | grep -E "^- docs" || true)
          CHORE=$(echo "$COMMITS" | grep -E "^- chore|^- refactor|^- style|^- perf" || true)
          OTHER=$(echo "$COMMITS" | grep -vE "^- feat|^- fix|^- docs|^- chore|^- refactor|^- style|^- perf" || true)

          # Build entry
          ENTRY="## ${NEXT} — ${DATE}"$'\n'
          [ -n "$FEAT" ]  && ENTRY+=$'\n### Nuove funzionalità\n'"$FEAT"$'\n'
          [ -n "$FIX" ]   && ENTRY+=$'\n### Fix\n'"$FIX"$'\n'
          [ -n "$DOCS" ]  && ENTRY+=$'\n### Documentazione\n'"$DOCS"$'\n'
          [ -n "$CHORE" ] && ENTRY+=$'\n### Manutenzione\n'"$CHORE"$'\n'
          [ -n "$OTHER" ] && ENTRY+=$'\n### Altro\n'"$OTHER"$'\n'

          # Save entry for release body (multiline safe)
          echo "entry<<EOF" >> $GITHUB_OUTPUT
          echo "$ENTRY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ── Git tag ─────────────────────────────────────────────────────────────
      - name: Tag release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.next }}
          git push origin ${{ steps.version.outputs.next }}

      # ── GitHub Release ───────────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.next }}
          name: ${{ steps.version.outputs.next }}
          body: ${{ steps.changelog.outputs.entry }}
          draft: false
          prerelease: false

      # ── Sync env vars to Vercel (before any build) ─────────────────────────────
      - name: Sync environment variables to Vercel
        run: |
          cat > /tmp/sync_env.sh << 'EOFSCRIPT'
          #!/bin/bash
          PROJECT_ID="prj_mVO3o0lx6I4DfXQm4IIzqvcc6NBk"
          TOKEN="$VERCEL_TOKEN"
          
          VARS_TO_SYNC=(
            "DATABASE_URL"
            "NEXTAUTH_SECRET"
            "NEXTAUTH_URL"
            "AWS_ACCESS_KEY_ID"
            "AWS_SECRET_ACCESS_KEY"
            "AWS_REGION"
            "AWS_S3_BUCKET"
            "AWS_IAM_USER_NAME"
            "BYPASS_OTP"
          )
          
          for VAR in "${VARS_TO_SYNC[@]}"; do
            VALUE=$(eval "echo \$$VAR")
            if [ -z "$VALUE" ]; then continue; fi
            echo "Syncing $VAR to Vercel Production..."
            curl -s -X POST "https://api.vercel.com/v10/projects/$PROJECT_ID/env" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"key\":\"$VAR\",\"value\":\"$VALUE\",\"target\":[\"production\"]}" > /dev/null
          done
          EOFSCRIPT
          bash /tmp/sync_env.sh
        env:
          VERCEL_TOKEN: ${{ env.VERCEL_TOKEN }}

      # ── Build + Deploy production ────────────────────────────────────────────
      - name: Build
        run: npm run build

      - name: Deploy to Vercel (production)
        run: |
          npx vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          npx vercel build --prod --token=$VERCEL_TOKEN
          npx vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
        env:
          VERCEL_ORG_ID: ${{ env.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ env.VERCEL_PROJECT_ID }}
