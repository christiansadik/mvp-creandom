name: Deploy Preview (develop)

on:
  push:
    branches:
      - develop

jobs:
  deploy:
    name: Migrate + Deploy to Vercel preview
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Load secrets from Doppler
        run: doppler secrets download --no-file --format env-no-quotes >> $GITHUB_ENV
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run DB migrations
        run: npx prisma migrate deploy

      - name: Build
        run: npm run build

      - name: Sync environment variables to Vercel
        run: |
          cat > /tmp/sync_env.sh << 'EOFSCRIPT'
          #!/bin/bash
          PROJECT_ID="prj_mVO3o0lx6I4DfXQm4IIzqvcc6NBk"
          TOKEN="$VERCEL_TOKEN"
          
          VARS_TO_SYNC=(
            "DATABASE_URL"
            "NEXTAUTH_SECRET"
            "NEXTAUTH_URL"
            "AWS_ACCESS_KEY_ID"
            "AWS_SECRET_ACCESS_KEY"
            "AWS_REGION"
            "AWS_S3_BUCKET"
            "AWS_IAM_USER_NAME"
            "BYPASS_OTP"
          )
          
          for VAR in "${VARS_TO_SYNC[@]}"; do
            VALUE=$(eval "echo \$$VAR")
            if [ -z "$VALUE" ]; then continue; fi
            echo "Syncing $VAR to Vercel Preview..."
            curl -s -X POST "https://api.vercel.com/v10/projects/$PROJECT_ID/env" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"key\":\"$VAR\",\"value\":\"$VALUE\",\"target\":[\"preview\"]}" > /dev/null
          done
          EOFSCRIPT
          bash /tmp/sync_env.sh
        env:
          VERCEL_TOKEN: ${{ env.VERCEL_TOKEN }}

      - name: Deploy to Vercel (preview)
        run: |
          npx vercel pull --yes --environment=preview --token=$VERCEL_TOKEN
          npx vercel build --token=$VERCEL_TOKEN
          npx vercel deploy --prebuilt --token=$VERCEL_TOKEN
        env:
          VERCEL_ORG_ID: ${{ env.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ env.VERCEL_PROJECT_ID }}
