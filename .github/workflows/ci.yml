name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  ci:
    name: Type check, lint, build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Build-time dummy values — no real DB needed
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/creandom?schema=public"
          NEXTAUTH_SECRET: "ci-secret-not-used-in-production"
          NEXTAUTH_URL: "http://localhost:3000"
